# ============================================================
# frontend/nginx.conf
# Nginx web server config for serving the React app in Docker.
#
# In development: Vite's dev server handles everything.
# In Docker/production: Nginx takes over.
#
# What Nginx does here:
#   1. Serves built React static files (HTML, CSS, JS)
#   2. Handles React Router — sends ALL page requests to index.html
#      (Without this, refreshing /dashboard gives a 404)
#   3. Forwards /api/* requests to the backend container
# ============================================================

server {
    # Nginx listens on port 80 inside the container
    listen 80;

    # Root folder where Vite's build output lives
    root /usr/share/nginx/html;

    index index.html;

    # ── React Router Support ────────────────────────────────
    # Try exact file → directory → fallback to index.html
    # This is what makes React Router work on page refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ───────────────────────────────────────────
    # Any request to /api/* gets forwarded to the backend container.
    # In Docker Compose, backend is reachable at http://backend:5000
    # because Docker's DNS uses service names from docker-compose.yml
    location /api/ {
        proxy_pass http://backend-service:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health check endpoint ───────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Gzip Compression ────────────────────────────────────
    # Compress responses to save bandwidth and speed up page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}