name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: shravanvm/gitops-taskmanager-backend
  FRONTEND_IMAGE: shravanvm/gitops-taskmanager-frontend

jobs:

# ──────────────────────────────────────────
# JOB 1: TEST
# ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test

# ──────────────────────────────────────────
# JOB 2: BUILD AND SECURITY SCAN
# ──────────────────────────────────────────
  build-and-scan:
    name: Build and Trivy Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend

      - name: Build frontend Docker image
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

# ──────────────────────────────────────────
# JOB 3: PUSH TO DOCKER HUB
# ──────────────────────────────────────────
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

# ──────────────────────────────────────────
# JOB 4: UPDATE K8S MANIFESTS
# ──────────────────────────────────────────
  update-k8s:
    name: Update K8s Image Tags
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backend image tag
        run: |
          sed -i "s|image: ${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" k8s/backend/deployment.yml

      - name: Update frontend image tag
        run: |
          sed -i "s|image: ${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" k8s/frontend/deployment.yml

      - name: Commit and push updated manifests
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/backend/deployment.yml k8s/frontend/deployment.yml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
