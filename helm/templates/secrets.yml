# ============================================================
# secrets.yml — Sensitive data for the application
# Stores JWT_SECRET and DB_PASSWORD in base64 encoded format
# base64 is encoding, NOT encryption — use a secret manager
# like AWS Secrets Manager or HashiCorp Vault for real security
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "taskmanager.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | b64enc | quote }}
  