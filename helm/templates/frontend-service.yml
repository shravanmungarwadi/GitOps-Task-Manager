# ============================================================
# frontend-service.yml — Network access to the frontend pods
# Gives the frontend a fixed hostname inside the cluster
# The Ingress routes non-API requests to this Service
# Type ClusterIP because Ingress handles external access
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "taskmanager.fullname" . }}-frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "taskmanager.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      protocol: TCP