# ============================================================
# ingress.yml — Routes external traffic to frontend and backend
# Single entry point for all traffic from outside the cluster
# /api and /health go to backend, everything else to frontend
# Only created when ingress.enabled is true in values
# ============================================================
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "taskmanager.fullname" . }}-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
