# ============================================================
# docker-compose.yml
# Defines all 3 services: postgres, backend, frontend
# One command to start everything: docker compose up --build
# One command to stop everything:  docker compose down
# ============================================================

version: '3.8'

# ── SERVICES ─────────────────────────────────────────────────
# A "service" = one container
# We have 3 services: postgres, backend, frontend
services:

  # ── SERVICE 1: PostgreSQL Database ───────────────────────
  postgres:
    # Use the official postgres image from Docker Hub
    # We don't build this one — we use it directly as-is
    image: postgres:15

    # Container name — what it's called in docker ps
    container_name: taskmanager-postgres

    # Always restart if it crashes
    restart: unless-stopped

    # Environment variables — these configure the postgres image
    # postgres:15 image reads these automatically on first start
    environment:
      POSTGRES_DB: taskmanager       # creates this database automatically
      POSTGRES_USER: postgres        # creates this user automatically
      POSTGRES_PASSWORD: postgres    # sets this password automatically

    # Map container port 5432 to your laptop port 5432
    # Format is: "laptop_port:container_port"
    # This lets you connect to postgres from your laptop using
    # a tool like pgAdmin or DBeaver if you want to inspect data
    ports:
      - "5432:5432"

    # Volume — this is how data survives container restarts
    # Without this, every time you run docker compose down,
    # ALL your database data is wiped. With this, data persists.
    # Format: named_volume:path_inside_container
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Which network this container joins
    # All 3 services must be on the same network to talk to each other
    networks:
      - taskmanager-network

    # Health check — wait until postgres is actually ready
    # before allowing backend to connect to it
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── SERVICE 2: Node.js Backend ────────────────────────────
  backend:
    # Instead of using a pre-built image, BUILD from our Dockerfile
    # context = where to find the files (the backend folder)
    # dockerfile = which Dockerfile to use
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: taskmanager-backend

    restart: unless-stopped

    # Environment variables passed into the container
    # These override the defaults in backend/src/config/index.js
    # DB_HOST=postgres → "postgres" is the SERVICE NAME above
    # Docker's internal DNS resolves "postgres" to that container's IP
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres        # ← service name, not localhost!
      DB_PORT: 5432
      DB_NAME: taskmanager
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:8080

    ports:
      - "5000:5000"

    # depends_on → backend will NOT start until postgres is healthy
    # This solves the "backend crashes because postgres isn't ready" problem
    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - taskmanager-network

    # Health check for backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── SERVICE 3: React Frontend ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: taskmanager-frontend

    restart: unless-stopped

    # Map container port 80 (Nginx) to laptop port 8080
    # Visit http://localhost:8080 to see the React app
    ports:
      - "8080:80"

    # Frontend depends on backend being healthy
    # No point loading the UI if the API isn't running
    depends_on:
      backend:
        condition: service_healthy

    networks:
      - taskmanager-network

# ── NETWORKS ─────────────────────────────────────────────────
# Define the shared network all services join
# Docker creates this network automatically when you run compose up
# All services can reach each other using their SERVICE NAME as hostname
networks:
  taskmanager-network:
    driver: bridge

# ── VOLUMES ──────────────────────────────────────────────────
# Named volume for postgres data persistence
# Docker manages this volume — data lives here even after containers stop
# To see it: docker volume ls
# To delete it: docker volume rm gitops-taskmanager_postgres_data
volumes:
  postgres_data:
    driver: local